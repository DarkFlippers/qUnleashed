name: Android, Linux, and Windows prerelease

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Check GitHub server
    runs-on: ubuntu-latest
    steps:
      - name: Cancel outside github.com
        if: ${{ github.server_url != 'https://github.com' }}
        run: |
          echo "Unsupported GitHub server: ${GITHUB_SERVER_URL}"
          exit 1

      - name: Confirm github.com
        if: ${{ github.server_url == 'https://github.com' }}
        run: echo "Running on ${{ github.server_url }}"

  build-android-linux:
    name: Build Android and Linux releases
    needs: guard
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Android release APK
        run: flutter build apk --release

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Build Linux single-file executable
        run: tools/build/linux.sh

      - name: Prepare Android release asset
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/qunleashed-${GITHUB_REF_NAME}.apk"

      - name: Upload Android and Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-android-linux
          path: |
            dist/qunleashed-${{ github.ref_name }}.apk
            dist/qunleashed-linux-x64
          if-no-files-found: error

  build-windows:
    name: Build Windows release
    needs: guard
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Prepare Windows release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath "dist\qunleashed-${env:GITHUB_REF_NAME}-windows-x64.zip" `
            -Force

      - name: Upload Windows release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: dist/qunleashed-${{ github.ref_name }}-windows-x64.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub prerelease
    needs:
      - build-android-linux
      - build-windows
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-assets-*
          merge-multiple: true

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/qunleashed-${{ github.ref_name }}.apk
            dist/qunleashed-linux-x64
            dist/qunleashed-${{ github.ref_name }}-windows-x64.zip
