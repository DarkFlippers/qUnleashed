name: Android, iOS, Linux, macOS, and Windows prerelease

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Check GitHub server
    runs-on: ubuntu-latest
    steps:
      - name: Cancel outside github.com
        if: ${{ github.server_url != 'https://github.com' }}
        run: |
          echo "Unsupported GitHub server: ${GITHUB_SERVER_URL}"
          exit 1

      - name: Confirm github.com
        if: ${{ github.server_url == 'https://github.com' }}
        run: echo "Running on ${{ github.server_url }}"

  build-android-linux:
    name: Build Android and Linux releases
    needs: guard
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Restore Flutter Firebase options
        env:
          FIREBASE_OPTIONS_DART_BASE64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
        run: tools/restore_firebase_config.sh dart

      - name: Restore Android Firebase config
        env:
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: tools/restore_firebase_config.sh android

      - name: Derive app version from tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            echo "::error::Tag must contain a semantic version like 0.6.1, alpha-0.6.1, or v0.6.1."
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          version_name="${major}.${minor}.${patch}"
          version_code=$((10#$major * 1000000 + 10#$minor * 1000 + 10#$patch))

          if (( version_code <= 0 )); then
            echo "::error::Derived Android versionCode must be greater than zero."
            exit 1
          fi

          {
            echo "QUNLEASHED_VERSION_NAME=$version_name"
            echo "QUNLEASHED_VERSION_CODE=$version_code"
            echo "QUNLEASHED_FLUTTER_BUILD_ARGS=--build-name=$version_name --build-number=$version_code"
          } >> "$GITHUB_ENV"

          echo "Version name: $version_name"
          echo "Version code: $version_code"

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "::error::Android signing secrets are not configured. Set ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD in GitHub repository secrets."
            exit 1
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

          {
            echo "storeFile=upload-keystore.jks"
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
          } > android/key.properties

      - name: Build Android release APKs
        run: tools/build/android.sh

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libayatana-appindicator3-dev

      - name: Build Linux single-file executable
        run: tools/build/linux.sh

      - name: Upload Android and Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-android-linux
          path: |
            dist/qunleashed_*_android_*.apk
            dist/qunleashed_*_linux_x64
          if-no-files-found: error

  build-windows:
    name: Build Windows release
    needs: guard
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Restore Flutter Firebase options
        shell: bash
        env:
          FIREBASE_OPTIONS_DART_BASE64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
        run: tools/restore_firebase_config.sh dart

      - name: Derive app version from tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            echo "::error::Tag must contain a semantic version like 0.6.1, alpha-0.6.1, or v0.6.1."
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          version_name="${major}.${minor}.${patch}"
          version_code=$((10#$major * 1000000 + 10#$minor * 1000 + 10#$patch))

          if (( version_code <= 0 )); then
            echo "::error::Derived build number must be greater than zero."
            exit 1
          fi

          {
            echo "QUNLEASHED_VERSION_NAME=$version_name"
            echo "QUNLEASHED_VERSION_CODE=$version_code"
            echo "QUNLEASHED_FLUTTER_BUILD_ARGS=--build-name=$version_name --build-number=$version_code"
          } >> "$GITHUB_ENV"

          echo "Version name: $version_name"
          echo "Build number: $version_code"

      - name: Build Windows raw ZIP and packaged EXE
        shell: pwsh
        env:
          # permission_handler_windows pulls in <experimental/coroutine> via C++/WinRT,
          # which the latest MSVC turns into a hard error. cl.exe reads _CL_ for extra
          # options, so this define reaches the plugin compile through MSBuild/CMake.
          _CL_: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
        run: ./tools/build/windows.ps1

      - name: Upload Windows release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: |
            dist/qunleashed_*_windows_x64_raw.zip
            dist/qunleashed_*_windows_x64.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS and iOS releases
    needs: guard
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Firebase pulls grpc as an SPM binary target (grpc.zip from dl.google.com),
      # which flakes with "network connection was lost" on macOS runners. Both
      # ios/ and macos/ have CocoaPods set up, so build through pods instead.
      - name: Disable Swift Package Manager (use CocoaPods)
        run: flutter config --no-enable-swift-package-manager

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Restore Flutter Firebase options
        env:
          FIREBASE_OPTIONS_DART_BASE64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
        run: tools/restore_firebase_config.sh dart

      - name: Restore macOS Firebase config
        env:
          MACOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.MACOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: tools/restore_firebase_config.sh macos

      - name: Restore iOS Firebase config
        env:
          IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: tools/restore_firebase_config.sh ios

      - name: Derive app version from tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            echo "::error::Tag must contain a semantic version like 0.6.1, alpha-0.6.1, or v0.6.1."
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          version_name="${major}.${minor}.${patch}"
          version_code=$((10#$major * 1000000 + 10#$minor * 1000 + 10#$patch))

          if (( version_code <= 0 )); then
            echo "::error::Derived build number must be greater than zero."
            exit 1
          fi

          {
            echo "QUNLEASHED_VERSION_NAME=$version_name"
            echo "QUNLEASHED_VERSION_CODE=$version_code"
            echo "QUNLEASHED_FLUTTER_BUILD_ARGS=--build-name=$version_name --build-number=$version_code"
          } >> "$GITHUB_ENV"

          echo "Version name: $version_name"
          echo "Build number: $version_code"

      - name: Install macOS build dependencies
        run: brew install automake libtool

      - name: Build macOS release
        run: tools/build/macos.sh

      - name: Build iOS release IPA
        run: tools/build/ios.sh

      - name: Upload macOS and iOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos
          path: |
            dist/qunleashed_*_macos_*.dmg
            dist/qunleashed_*_ios_*.ipa
          if-no-files-found: error

  publish:
    name: Publish GitHub prerelease
    needs:
      - build-android-linux
      - build-macos
      - build-windows
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-assets-*
          merge-multiple: true

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/qunleashed_*_android_*.apk
            dist/qunleashed_*_ios_*.ipa
            dist/qunleashed_*_linux_x64
            dist/qunleashed_*_macos_*.dmg
            dist/qunleashed_*_windows_x64_raw.zip
            dist/qunleashed_*_windows_x64.exe
